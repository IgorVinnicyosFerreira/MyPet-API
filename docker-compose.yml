version: '3.8'

services:
  db:
    image: postgres:16.12-bookworm
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mypet
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: pnpm dev
    environment:
      NODE_ENV: development
      PORT: 3333
      HOST: 0.0.0.0
      DATABASE_URL: postgres://postgres:postgres@db:5432/mypet
    ports:
      - '3333:3333'
    volumes:
      - ./:/usr/src/app:cached
      - node_modules:/usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    tty: true

volumes:
  db_data:
  node_modules:
